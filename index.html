<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karrabean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <a href="#" class="logo">KARRABEAN</a>
        <ul class="nav">
            <li><a href="#"><ion-icon name="home-outline"></ion-icon></a></li>
             <li><a href="#">About</a></li>
              <li><a href="#">Shop</a></li>
               <li><a href="#">Home</a></li>
        </ul>
        <ul class="utility">
            <li><a href="#"></a><ion-icon name="search-outline"></ion-icon></li>
            <li><a href="#"></a><ion-icon name="person-outline"></ion-icon></li>
            <li><a href="#"></a><ion-icon name="heart-outline"></ion-icon></li>
            <li><a href="#"></a><ion-icon name="bag-handle-outline"></ion-icon>
                <span class="number">8</span>
            </li>
        </ul>
    </header>
    

    <section class="hero">
      <p class="text">KRBN</p>
       <button class="one">shop now</button>
        <button class="two">discover</button>
    </section>


    <main>
        <section class="call-up">
            <div class="box">
                <ion-icon name="send-outline"></ion-icon>
                <div>
                    <h4>Free shipping</h4>
                    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. </p>
                </div>
                <div class="box">
                <ion-icon name="card-outline"></ion-icon>
                <div>
                    <h4>Security Payment</h4>
                    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. </p>
                </div>
                <div class="box">
                <ion-icon name="cash-outline"></ion-icon>
                <div>
                    <h4>Return Policy</h4>
                    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. </p>
                </div>
            </div>
        </section>

        <section id="about" class="about">
            <div class="left">
                <div class="promo about-box"><img src="Footwear.jpeg" alt=""></div>
                <div class="style about-box"><img src="Jewelz.jpeg" alt=""></div>
            </div>
            <div class="right">
                <div class="collection about-box"><img src="Runway.jpeg" alt=""></div>
                <div class="discovery about-box"><img src="Customs.jpeg" alt=""></div>
            </div>
        </section>
    </main>


    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
